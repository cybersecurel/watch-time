<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchTime - Analytics Dashboard</title>
    <style>
        :root { --bg-primary: #121212; --bg-surface: #1e1e1e; --text-primary: #ffffff; --accent: #ff0000; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background-color: var(--bg-surface); padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc0000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .video-wrapper { aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="auth-section">
        <h2>Dashboard Login</h2>
        <div class="form-group"><input type="email" id="email" placeholder="Email Address"></div>
        <div class="form-group"><input type="password" id="password" placeholder="Password"></div>
        <button onclick="handleLogin()">Sign In</button>
    </div>

    <div class="card" id="app-section" style="display:none;">
        <h2>Active WatchTime Manager</h2>
        <div class="form-group"><input type="text" id="video-url" placeholder="YouTube Video URL"></div>
        <div class="form-group"><input type="number" id="tab-count" placeholder="Number of instances (e.g. 5)"></div>
        <button onclick="launchVideos()">Launch Streams</button>
        <div id="video-grid" class="grid"></div>
    </div>
</div>

<script>
    function handleLogin() {
        const email = document.getElementById('email').value;
        if(email) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
        }
    }

    function launchVideos() {
        const url = document.getElementById('video-url').value;
        const count = document.getElementById('tab-count').value;
        const grid = document.getElementById('video-grid');
        grid.innerHTML = '';

        // Extract ID - handles various YT URL formats
        const videoId = url.split(/(?:v=|youtu\.be\/)([^&?]+)/)[1] || 'dQw4w9WgXcQ';

        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            div.className = 'video-wrapper';
            // Parameters: Auto-play, mute, loop, and playlist for continuous replay
            div.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}" 
                             allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            grid.appendChild(div);
        }
    }
</script>

</body>
</html>
